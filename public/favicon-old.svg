<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Radial gradient: slightly lighter in the center -->
    <radialGradient id="cinnamonGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D9893D"/>
      <stop offset="100%" stop-color="#B8681F"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#cinnamonGradient)" />

  <!-- Simple cinnamon-stick inspired mark -->
  <g fill="#8A4F17">
    <rect x="14" y="30" width="36" height="6" rx="3"/>
    <circle cx="18" cy="33" r="3"/>
  </g>
</svg>

