<!-- the single page that loads our react app, the entry point -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" /> <!-- favicon (public_url is replaced with my public folder path) -->
    <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- makes the app responsive on mobile -->
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Cinnamon Leather Co"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" /> 
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" /> <!-- makes the site installable, defines what the "app" icon looks like? -->
    <title>Cinnamon Leather Co</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div> <!-- Main entry point for all HTML! - react injects all my components into this -->
  </body>
</html>
